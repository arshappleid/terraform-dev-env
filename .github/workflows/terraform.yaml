name: "Terraform Multi-Environment Pipeline"

on:
  pull_request:
    branches: [ main ]
    paths: [ 'iac/**' ]
  push:
    branches: [ main ]
    paths: [ 'iac/**' ]

permissions:
  id-token: write # Required for OIDC AWS Authentication
  contents: read
  security-events: write # Required for GitHub Advanced Security (SARIF upload)

env:
  AWS_REGION: "us-east-1"
  TERRAFORM_ROLE_ARN: "arn:aws:iam::123456789012:role/github-actions-terraform-executor"

jobs:
  security-scan:
    name: "Checkov Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Checkov against Terraform code
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true # Allows the pipeline to continue so SARIF can be uploaded to GHAS

      - name: Upload SARIF results to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure() # Run this step regardless of checkov's exit code
        with:
          sarif_file: results.sarif

  terraform:
    name: "Terraform CI/CD"
    runs-on: ubuntu-latest
    
    # Executes lifecycle steps inside your pre-baked Ubuntu 26.04 container image
    container:
      image: hashicorp/terraform:1.15

    # Run Inside the directory where the change was made. Allows to create separate directories per resources, reducing the size of terraform modules.
    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Authenticate to AWS via OIDC using environment variables
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ env.TERRAFORM_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    # 1. Initialize Remote State Backend & Modules
    - name: Terraform Init
      run: terraform init

    # 2. Speculative Plan (Runs only during Pull Requests)
    - name: Terraform Plan
      if: github.event_name == 'pull_request'
      run: terraform plan

    # 3. Execution Deployment (Runs only on Merge to Main)
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply --auto-approve
